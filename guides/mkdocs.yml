site_name: Cranebot/Stringman Docs
site_url: https://nhnifong.github.io/neufangled-site
repo_url: https://github.com/nhnifong/cranebot3-firmware
theme:
  name: material
  logo: icons/neufangled_icon_outline.png
  favicon: icons/neufangled_icon_32.png
  palette:
    scheme: default
    primary: indigo
    accent: green
  features:
    - navigation.footer
    - content.tabs.link
extra:
  social:
    - icon: fontawesome/solid/hand-holding-dollar 
      link: https://ko-fi.com/neufangled
    - icon: fontawesome/brands/github
      link: https://github.com/nhnifong/cranebot3-firmware/tree/main
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@overengineer7691
    - icon: fontawesome/brands/discord
      link: https://discord.gg/T5HEvxVgbA
  homepage: http://neufangled.com/
markdown_extensions:
  - attr_list
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - footnotes
plugins:
  - glightbox
  - search
extra_css:
  - stylesheets/extra.css
hooks:
  - url_replacer.py
nav:
    - index.md
    - Stringman Arpeggio (Latest):
        - arpeggio_anchor_build_guide.md
        - arpeggio_gripper_build_guide.md
        - arp_install_guide.md
    - Earlier Versions:
        - gripper_build_guide.md
        - anchor_build_guide.md
        - gantry_build_guide.md
        - installation_guide.md
        - print_guide.md
        - wire_guide.md
    - downloads.md
    - imitation_learning.md
    - lan_only_guide.md
    - quality_assurance.md
    - raspi_setup.md
    - usage_guide.md