<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugging Face Authorization</title>
    <style>
        body {
            /* Clean, modern sans-serif stack */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9fafb;
            color: #374151;
            text-align: center;
            padding: 1rem;
        }
        .message-container {
            max-width: 450px;
            padding: 2.5rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 1rem;
            color: #111827;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            color: #4b5563;
        }
        .status {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #2563eb; /* Blue for processing */
        }
    </style>
</head>
<body>
    <div class="message-container">
        <h1>Authorization Received</h1>
        <p>You have authorized Stringman to record datasets in your Hugging Face account. You may close this tab.</p>
        <div id="statusText" class="status">Processing your authorization...</div>
    </div>
    <script type="module" src="/src/hf.ts"></script>
</body>
</html>
