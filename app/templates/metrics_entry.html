<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Monthly Scores | Neufangled Robotics</title>
    <link rel="stylesheet" href="/static/detail-page-styles.css" />
    <style>
        .metrics-panel {
            max-width: 680px;
            margin: 3rem auto;
            padding: 2rem;
        }
        .metrics-panel h1 { text-align: center; }
        .metrics-status { text-align: center; opacity: 0.8; margin-top: 1rem; }

        .score-card {
            border: 1px solid rgba(127, 127, 127, 0.25);
            border-radius: 12px;
            padding: 1.75rem;
            margin-top: 1.5rem;
            background: rgba(127, 127, 127, 0.06);
        }
        .score-section {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.6;
        }
        .score-title { font-size: 1.5rem; margin: 0.25rem 0 0.75rem; }
        .score-prompt { line-height: 1.55; margin-bottom: 1.25rem; }
        .score-progress { font-size: 0.85rem; opacity: 0.6; margin-bottom: 0.5rem; }

        .score-input-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 0.5rem;
        }
        .score-input-row input {
            font-size: 1.4rem;
            padding: 0.5rem 0.75rem;
            width: 160px;
            border: 1px solid rgba(127, 127, 127, 0.4);
            border-radius: 8px;
            background: transparent;
            color: inherit;
        }
        .score-unit { opacity: 0.7; }
        .score-hint { font-size: 0.8rem; opacity: 0.55; }

        .score-actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 1.5rem;
        }
        .score-actions button {
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }
        .btn-secondary { background: rgba(127, 127, 127, 0.2); color: inherit; }
        .btn-primary { background: #7cdbfb; color: #06222c; font-weight: 600; }
        .btn-primary:disabled { opacity: 0.5; cursor: default; }

        .field-row { display: flex; align-items: center; gap: 12px; margin: 1rem 0; }
        .field-row label { min-width: 160px; }
        .field-row input[type="date"] {
            padding: 0.45rem 0.6rem;
            border: 1px solid rgba(127, 127, 127, 0.4);
            border-radius: 8px;
            background: transparent;
            color: inherit;
        }

        .review-list { list-style: none; padding: 0; margin: 1rem 0; }
        .review-list li {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(127, 127, 127, 0.15);
        }
        .review-list .skipped { opacity: 0.5; font-style: italic; }
        .review-value { font-weight: 600; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/">Home</a>
        <a href="/store">Store</a>
        <a href="/docs/">Docs</a>
        <a href="/playroom">Playroom</a>
        <a href="/scoreboard">Scoreboard</a>
        <a href="/employee">Employee</a>
    </nav>

    <section class="metrics-panel">
        <h1>Monthly Scores</h1>
        <p id="status" class="metrics-status">Checking your access&hellip;</p>
        <div id="score-entry" hidden></div>
    </section>

    <!-- Firebase (compat build). Config matches employee_hello.html / nf-viz/src/auth.ts. -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbPMdrWfinNR6at8YDvZJaXP8vdJbkmOI",
            authDomain: "nf-web-480214.firebaseapp.com",
            projectId: "nf-web-480214",
            storageBucket: "nf-web-480214.firebasestorage.app",
            messagingSenderId: "690802609278",
            appId: "1:690802609278:web:8165450202df8179029c2f"
        };
        firebase.initializeApp(firebaseConfig);

        const statusEl = document.getElementById('status');
        const entryEl = document.getElementById("score-entry");

        let idToken = null;
        let metrics = [];
        // step -1 = date picker; 0..N-1 = a metric; N = review.
        let step = -1;
        const values = {};            // metric_key -> number (only filled ones)
        let measuredOn = new Date().toISOString().slice(0, 10);

        async function init(user) {
            if (!user) { statusEl.textContent = 'Please sign in to view this page.'; return; }
            try {
                idToken = await user.getIdToken();
                const res = await fetch('/api/metrics/definitions', {
                    headers: { 'Authorization': `Bearer ${idToken}` }
                });
                if (res.status === 403) {
                    statusEl.textContent = 'Access denied — this page is for employees only.';
                    return;
                }
                if (!res.ok) { statusEl.textContent = `Something went wrong (HTTP ${res.status}).`; return; }
                metrics = (await res.json()).metrics;
                statusEl.hidden = true;
                entryEl.hidden = false;
                render();
            } catch (e) {
                statusEl.textContent = 'Could not verify access. Please try again.';
                console.error(e);
            }
        }

        function render() {
            if (step === -1) return renderDate();
            if (step < metrics.length) return renderMetric();
            return renderReview();
        }

        function renderDate() {
            entryEl.innerHTML = `
                <div class="score-card">
                    <h2 class="score-title">New measurement session</h2>
                    <p class="score-prompt">You'll be prompted through each experiment in turn.
                    Enter the date these measurements were taken, then begin.</p>
                    <div class="field-row">
                        <label for="measured-on">Measurement date</label>
                        <input type="date" id="measured-on" value="${measuredOn}">
                    </div>
                    <div class="score-actions">
                        <span></span>
                        <button class="btn-primary" id="begin">Begin &rarr;</button>
                    </div>
                </div>`;
            document.getElementById('measured-on').addEventListener('change', (e) => {
                measuredOn = e.target.value;
            });
            document.getElementById('begin').addEventListener('click', () => {
                if (!measuredOn) { alert('Please pick a date.'); return; }
                step = 0; render();
            });
        }

        function renderMetric() {
            const m = metrics[step];
            const isInt = m.input_kind === 'int';
            const current = values[m.key] ?? '';
            entryEl.innerHTML = `
                <div class="score-card">
                    <div class="score-progress">Step ${step + 1} of ${metrics.length}</div>
                    <div class="score-section">${m.section}</div>
                    <h2 class="score-title">${m.title}</h2>
                    <p class="score-prompt">${m.prompt}</p>
                    <div class="score-input-row">
                        <input type="number" id="score" inputmode="decimal"
                               step="${isInt ? '1' : 'any'}" value="${current}"
                               placeholder="score">
                        <span class="score-unit">${m.unit}</span>
                    </div>
                    <div class="score-hint">Leave blank to skip this metric.</div>
                    <div class="score-actions">
                        <button class="btn-secondary" id="back">&larr; Back</button>
                        <button class="btn-primary" id="next">
                            ${step === metrics.length - 1 ? 'Review &rarr;' : 'Next &rarr;'}
                        </button>
                    </div>
                </div>`;
            const input = document.getElementById('score');
            input.focus();
            const commit = () => {
                const raw = input.value.trim();
                if (raw === '') { delete values[m.key]; }
                else {
                    const num = Number(raw);
                    if (Number.isNaN(num)) { alert('Please enter a number, or leave blank to skip.'); return false; }
                    values[m.key] = isInt ? Math.round(num) : num;
                }
                return true;
            };
            document.getElementById('back').addEventListener('click', () => {
                if (commit() === false) return;
                step -= 1; render();
            });
            document.getElementById('next').addEventListener('click', () => {
                if (commit() === false) return;
                step += 1; render();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('next').click();
            });
        }

        function renderReview() {
            const rows = metrics.map((m) => {
                const has = Object.prototype.hasOwnProperty.call(values, m.key);
                return `<li class="${has ? '' : 'skipped'}">
                            <span>${m.title}</span>
                            <span class="review-value">${has ? values[m.key] + ' ' + m.unit : 'skipped'}</span>
                        </li>`;
            }).join('');
            entryEl.innerHTML = `
                <div class="score-card">
                    <h2 class="score-title">Review &amp; submit</h2>
                    <p class="score-prompt">Measurements for <strong>${measuredOn}</strong>:</p>
                    <ul class="review-list">${rows}</ul>
                    <div class="score-actions">
                        <button class="btn-secondary" id="back">&larr; Back</button>
                        <button class="btn-primary" id="submit"
                            ${Object.keys(values).length === 0 ? 'disabled' : ''}>Submit</button>
                    </div>
                    <p id="submit-status" class="metrics-status"></p>
                </div>`;
            document.getElementById('back').addEventListener('click', () => { step = metrics.length - 1; render(); });
            document.getElementById('submit').addEventListener('click', submit);
        }

        async function submit() {
            const btn = document.getElementById('submit');
            const submitStatus = document.getElementById('submit-status');
            btn.disabled = true;
            submitStatus.textContent = 'Saving…';
            try {
                const res = await fetch('/api/metrics', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    },
                    body: JSON.stringify({ measured_on: measuredOn, values })
                });
                if (!res.ok) {
                    const detail = await res.json().catch(() => ({}));
                    submitStatus.textContent = `Save failed (HTTP ${res.status}). ${detail.detail || ''}`;
                    btn.disabled = false;
                    return;
                }
                entryEl.innerHTML = `
                    <div class="score-card" style="text-align:center;">
                        <h2 class="score-title">Saved ✓</h2>
                        <p class="score-prompt">Recorded ${Object.keys(values).length} metric(s) for ${measuredOn}.</p>
                        <div class="score-actions" style="justify-content:center;">
                            <a class="btn-primary" href="/scoreboard" style="text-decoration:none;">View Scoreboard</a>
                        </div>
                    </div>`;
            } catch (e) {
                submitStatus.textContent = 'Network error while saving. Please try again.';
                btn.disabled = false;
                console.error(e);
            }
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                init(user);
            } else {
                statusEl.textContent = 'Signing you in…';
                firebase.auth()
                    .signInWithPopup(new firebase.auth.GoogleAuthProvider())
                    .catch((e) => {
                        statusEl.textContent = 'Sign-in was cancelled. Reload to try again.';
                        console.error(e);
                    });
            }
        });
    </script>
</body>
</html>
