<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.webp" />
    <title>Employee Area | Neufangled Robotics</title>
    <link rel="stylesheet" href="/static/detail-page-styles.css" />
    <style>
        .employee-panel {
            max-width: 720px;
            margin: 4rem auto;
            padding: 2rem;
        }
        .employee-panel h1 { text-align: center; }
        .employee-status { text-align: center; margin-top: 1rem; opacity: 0.8; }
        .employee-account {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .pages-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        .pages-table th, .pages-table td {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(127, 127, 127, 0.25);
        }
        .pages-table th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }
        .pages-table td a { font-weight: 600; text-decoration: none; }
        .pages-table td a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/">Home</a>
        <a href="/store">Store</a>
        <a href="/docs/">Docs</a>
        <a href="/playroom">Playroom</a>
        <a href="/company">Company</a>
        <a href="/future">Future</a>
    </nav>

    <section class="employee-panel">
        <h1 id="heading">Employee Area</h1>
        <p id="status" class="employee-status">Checking your access&hellip;</p>
        <p id="account" class="employee-account" hidden></p>

        <table id="pages" class="pages-table" hidden>
            <thead>
                <tr>
                    <th>Page</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><a href="/employee/metrics">Metrics</a></td>
                    <td>Enter this month's success-metric scores.</td>
                </tr>
                <!-- Admin-only; revealed in JS when the user holds employee_admin. -->
                <tr id="row-admin" hidden>
                    <td><a href="/employee/admin">Role Administration</a></td>
                    <td>Grant and revoke roles for other users.</td>
                </tr>
            </tbody>
        </table>
    </section>

    <!-- Firebase (compat build, loaded from CDN). Config matches nf-viz/src/auth.ts. -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbPMdrWfinNR6at8YDvZJaXP8vdJbkmOI",
            authDomain: "nf-web-480214.firebaseapp.com",
            projectId: "nf-web-480214",
            storageBucket: "nf-web-480214.firebasestorage.app",
            messagingSenderId: "690802609278",
            appId: "1:690802609278:web:8165450202df8179029c2f"
        };
        firebase.initializeApp(firebaseConfig);

        const statusEl = document.getElementById('status');
        const accountEl = document.getElementById('account');
        const pagesEl = document.getElementById('pages');

        // Verify employee access (the /employee/hello gate returns the user's
        // email) and, on success, reveal the directory of internal pages.
        async function loadEmployeeContent(user) {
            if (!user) {
                statusEl.textContent = 'Please sign in to view this page.';
                return;
            }
            try {
                const token = await user.getIdToken();
                const res = await fetch('/employee/hello', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 403) {
                    statusEl.textContent = 'Access denied — this page is for employees only.';
                    return;
                }
                if (!res.ok) {
                    statusEl.textContent = `Something went wrong (HTTP ${res.status}).`;
                    return;
                }
                const data = await res.json();
                statusEl.textContent = 'Internal employee pages';
                accountEl.textContent = `Logged in as ${data.email}`;
                accountEl.hidden = false;
                pagesEl.hidden = false;
                // Reveal admin-only pages when the user holds employee_admin.
                if ((data.roles || []).includes('employee_admin')) {
                    document.getElementById('row-admin').hidden = false;
                }
            } catch (e) {
                statusEl.textContent = 'Could not verify access. Please try again.';
                console.error(e);
            }
        }

        // Sign in with Google if not already authenticated, then load content.
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                loadEmployeeContent(user);
            } else {
                statusEl.textContent = 'Signing you in…';
                firebase.auth()
                    .signInWithPopup(new firebase.auth.GoogleAuthProvider())
                    .catch((e) => {
                        statusEl.textContent = 'Sign-in was cancelled. Reload to try again.';
                        console.error(e);
                    });
            }
        });
    </script>
</body>
</html>
